services:
  lp-imersao-p:
    image: registry.fabioviana.app.br/byfabioviana/lp-imersao-p:latest
    container_name: lp-imersao-p
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      # HTTPS router (Cloudflare → Traefik via HTTPS)
      - "traefik.http.routers.lp-imersao-p.rule=Host(`imersaop.com.br`) || Host(`www.imersaop.com.br`)"
      - "traefik.http.routers.lp-imersao-p.entrypoints=websecure"
      - "traefik.http.routers.lp-imersao-p.tls=true"
      # HTTP router (Cloudflare → Traefik via HTTP fallback)
      - "traefik.http.routers.lp-imersao-p-http.rule=Host(`imersaop.com.br`) || Host(`www.imersaop.com.br`)"
      - "traefik.http.routers.lp-imersao-p-http.entrypoints=web"
      # Service
      - "traefik.http.services.lp-imersao-p.loadbalancer.server.port=80"
    networks:
      - fabiorede

networks:
  fabiorede:
    external: true
