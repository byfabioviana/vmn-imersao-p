services:
  lp-imersao-p:
    image: registry.fabioviana.app.br/byfabioviana/lp-imersao-p:latest
    container_name: lp-imersao-p
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lp-imersao-p.rule=Host(`imersao-p.fabioviana.app.br`)"
      - "traefik.http.routers.lp-imersao-p.entrypoints=websecure"
      - "traefik.http.routers.lp-imersao-p.tls.certresolver=letsencrypt"
      - "traefik.http.services.lp-imersao-p.loadbalancer.server.port=80"
    networks:
      - traefik

networks:
  traefik:
    external: true
