server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers (included in all locations)
    include /etc/nginx/conf.d/security-headers.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache de assets estáticos (imagens, fontes, WebP)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Cache do HTML (short — permite redeploy rápido)
    location ~* \.html$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        include /etc/nginx/conf.d/security-headers.conf;
    }

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/html text/css application/javascript text/plain application/json image/svg+xml;
    gzip_min_length 256;
}
