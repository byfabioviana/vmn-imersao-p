# ============================================================
# LP Imersão P — CI/CD Pipeline
# Trigger: push na branch main
#
# Fluxo:
#   1. Build da imagem Docker (nginx + HTML estático)
#   2. Push para registry privado
#   3. Atualiza stack no Portainer via API (docker-compose.yml)
#   4. Redeploy do serviço com nova imagem + labels atualizadas
#
# Secrets necessários no GitHub (Settings → Secrets → Actions):
#   REGISTRY_USERNAME          — usuário do registry
#   REGISTRY_PASSWORD          — senha do registry privado
#   REGISTRY_URL               — ex: registry.fabioviana.app.br
#   PORTAINER_URL              — ex: https://portainer.fabioviana.app.br
#   PORTAINER_API_KEY          — API key gerada no Portainer
#   PORTAINER_STACK_ID         — ID numérico do stack no Portainer
#   PORTAINER_ENDPOINT_ID      — ID numérico do endpoint (environment)
# ============================================================

name: Deploy LP Imersão P

on:
  push:
    branches:
      - main
    paths:
      - 'lp-imersao-p.html'
      - 'Dockerfile'
      - 'nginx.conf'
      - 'img/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy.yml'

  workflow_dispatch:

env:
  IMAGE: ${{ secrets.REGISTRY_URL }}/${{ secrets.REGISTRY_USERNAME }}/lp-imersao-p

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=sha,prefix=git-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Portainer stack
        run: |
          # Read docker-compose.yml content
          COMPOSE_CONTENT=$(cat docker-compose.yml)

          # Update stack via Portainer API
          HTTP_STATUS=$(curl -s -o /tmp/portainer-response.json -w "%{http_code}" \
            -X PUT "${{ secrets.PORTAINER_URL }}/api/stacks/${{ secrets.PORTAINER_STACK_ID }}?endpointId=${{ secrets.PORTAINER_ENDPOINT_ID }}" \
            -H "X-API-Key: ${{ secrets.PORTAINER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg content "$COMPOSE_CONTENT" '{
              stackFileContent: $content,
              pullImage: true,
              prune: true
            }')")

          echo "Portainer API status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::error::Portainer stack update falhou com status $HTTP_STATUS"
            cat /tmp/portainer-response.json
            exit 1
          fi

          echo "Stack atualizado com sucesso"

      - name: Deploy summary
        run: |
          echo "## Deploy LP Imersão P concluído" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Valor |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Imagem | \`${{ env.IMAGE }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Domínio | https://imersaop.com.br |" >> $GITHUB_STEP_SUMMARY
          echo "| Stack | Atualizado via Portainer API |" >> $GITHUB_STEP_SUMMARY
